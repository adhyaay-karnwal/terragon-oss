services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: terragon
      POSTGRES_USER: terragon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terragon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://terragon:${POSTGRES_PASSWORD:-changeme}@postgres:5432/terragon
      REDIS_URL: http://redis:6379
      REDIS_TOKEN: ""
      NODE_ENV: production
      DOCKER_BUILD: "true"
    volumes:
      - appuploads:/app/apps/www/public/uploads

volumes:
  pgdata:
  redisdata:
  appuploads:
